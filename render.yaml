services:
  - type: web
    name: nemesis-backend
    env: docker
    plan: free
    dockerCommand: uvicorn nemesis_core:app --host 0.0.0.0 --port 8000
    envVars:
      - key: BITQUERY_APIV2_TOKEN
        sync: false
      - key: ETHERSCAN_API_KEY
        sync: false
      - key: POLYGONSCAN_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
